x-php-service: &php-service
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm

  setup:
    <<: *php-service
    command: sh -lc "composer install && (test -f .env || cp .env.example .env) && php artisan key:generate --force && php artisan migrate --force"

  php-fpm:
    <<: *php-service
    command: sh -lc "until [ -f vendor/autoload.php ] && [ -f .env ]; do echo 'Waiting for composer install and .env'; sleep 2; done; php-fpm"

  queue:
    <<: *php-service
    command: sh -lc "until [ -f vendor/autoload.php ] && [ -f .env ] && php artisan migrate:status >/dev/null 2>&1; do echo 'Waiting for application setup and migrations'; sleep 2; done; php artisan queue:work database --queue=proxy-checks,default --sleep=1 --tries=1 --timeout=30"

  scheduler:
    <<: *php-service
    command: sh -lc "until [ -f vendor/autoload.php ] && [ -f .env ] && php artisan migrate:status >/dev/null 2>&1; do echo 'Waiting for application setup and migrations'; sleep 2; done; php artisan schedule:work"

  node-vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -lc "if [ ! -d node_modules/.bin ]; then if [ -f package-lock.json ]; then npm ci; else npm install; fi; fi; npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    depends_on:
      - nginx

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: proxy_manager
      MYSQL_USER: proxy_manager
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
  node-modules:
