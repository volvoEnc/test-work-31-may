x-app-build: &app-build
  context: .
  dockerfile: docker/php/Dockerfile
  target: app

x-app-environment: &app-environment
  APP_NAME: "${APP_NAME:-Proxy Manager}"
  APP_ENV: ${APP_ENV:-local}
  APP_KEY: "${APP_KEY:-base64:8IgZz3uvnColzZotte9pkJg1Di4JN8dUUYzE47cPKDU=}"
  APP_DEBUG: "${APP_DEBUG:-true}"
  APP_URL: ${APP_URL:-http://localhost:8088}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-proxy_manager}
  DB_USERNAME: ${DB_USERNAME:-proxy_manager}
  DB_PASSWORD: ${DB_PASSWORD:-secret}
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  SESSION_DRIVER: file
  PROXY_CHECK_URL: ${PROXY_CHECK_URL:-https://example.com/}
  PROXY_CHECK_INTERVAL_MINUTES: ${PROXY_CHECK_INTERVAL_MINUTES:-5}
  PROXY_CHECK_TIMEOUT_SECONDS: ${PROXY_CHECK_TIMEOUT_SECONDS:-8}
  PROXY_CHECK_CONNECT_TIMEOUT_SECONDS: ${PROXY_CHECK_CONNECT_TIMEOUT_SECONDS:-3}
  PROXY_CHECK_SUCCESS_CODES: ${PROXY_CHECK_SUCCESS_CODES:-200,204,301,302}
  PROXY_CHECK_STALE_AFTER_SECONDS: ${PROXY_CHECK_STALE_AFTER_SECONDS:-120}
  PROXY_CHECK_RETENTION_DAYS: ${PROXY_CHECK_RETENTION_DAYS:-30}
  PROXY_CHECK_QUEUE: ${PROXY_CHECK_QUEUE:-proxy-checks}
  PROXY_CHECK_UNIQUE_FOR_SECONDS: ${PROXY_CHECK_UNIQUE_FOR_SECONDS:-300}

x-app-volumes: &app-volumes
  - app-storage:/var/www/html/storage
  - app-bootstrap-cache:/var/www/html/bootstrap/cache

x-app-service: &app-service
  image: proxy-manager-app:local
  build: *app-build
  working_dir: /var/www/html
  environment: *app-environment
  volumes: *app-volumes

services:
  nginx:
    <<: *app-service
    command: sh -lc "mkdir -p /run/nginx && nginx -g 'daemon off;'"
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8088}:80"
    depends_on:
      php-fpm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  setup:
    <<: *app-service
    command: >
      sh -lc "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views storage/logs bootstrap/cache
      && php artisan optimize:clear
      && php artisan migrate --force
      && touch storage/framework/setup-complete"
    depends_on:
      mysql:
        condition: service_healthy

  php-fpm:
    <<: *app-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php-fpm"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int) ! file_exists('/var/www/html/storage/framework/setup-complete'));\""]
      interval: 5s
      timeout: 3s
      retries: 20

  queue:
    <<: *app-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php artisan queue:work database --queue=proxy-checks,default --sleep=1 --tries=1 --timeout=30"

  scheduler:
    <<: *app-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php artisan schedule:work"

  ready:
    <<: *app-service
    command: ["sh", "-lc", "echo 'Application is ready: http://127.0.0.1:${APP_HTTP_PORT:-8088}'"]
    depends_on:
      nginx:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-proxy_manager}
      MYSQL_USER: ${DB_USERNAME:-proxy_manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  app-bootstrap-cache:
  app-storage:
  mysql-data:
