x-php-service: &php-service
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8088}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php-fpm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  setup:
    <<: *php-service
    command: >
      sh -lc "composer install
      && (test -f .env || cp .env.example .env)
      && mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views storage/logs bootstrap/cache
      && if ! grep -Eq '^APP_KEY=.+$' .env; then php artisan key:generate --force; fi
      && php artisan optimize:clear
      && php artisan migrate --force
      && touch storage/framework/setup-complete"

  php-fpm:
    <<: *php-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php-fpm"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int) ! file_exists('/var/www/html/storage/framework/setup-complete'));\""]
      interval: 5s
      timeout: 3s
      retries: 20

  queue:
    <<: *php-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php artisan queue:work database --queue=proxy-checks,default --sleep=1 --tries=1 --timeout=30"

  scheduler:
    <<: *php-service
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    command: sh -lc "until [ -f storage/framework/setup-complete ]; do echo 'Waiting for application setup'; sleep 2; done; php artisan schedule:work"

  node-vite:
    image: node:22-alpine
    working_dir: /var/www/html
    environment:
      APP_HTTP_PORT: ${APP_HTTP_PORT:-8088}
      VITE_DEV_HOST: ${VITE_DEV_HOST:-127.0.0.1}
      VITE_DEV_PORT: ${VITE_DEV_PORT:-5173}
    command: sh -lc "if [ ! -d node_modules/.bin ]; then if [ -f package-lock.json ]; then npm ci; else npm install; fi; fi; npm run dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-5173}"
    ports:
      - "127.0.0.1:${VITE_DEV_PORT:-5173}:${VITE_DEV_PORT:-5173}"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${VITE_DEV_PORT:-5173}/@vite/client >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  ready:
    image: node:22-alpine
    command: ["sh", "-lc", "echo 'Application is ready: http://127.0.0.1:${APP_HTTP_PORT:-8088}'"]
    depends_on:
      nginx:
        condition: service_healthy
      node-vite:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: proxy_manager
      MYSQL_USER: proxy_manager
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
  node-modules:
